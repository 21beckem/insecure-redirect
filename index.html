<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Connect to App</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:        #16A34A;
  --green-light:  #DCFCE7;
  --green-glow:   rgba(22,163,74,0.18);
  --text:         #111827;
  --muted:        #9CA3AF;
  --border:       #E5E7EB;
  --surface:      #F9FAFB;
  --red:          #EF4444;
  --white:        #FFFFFF;
}

html, body {
  height: 100svh;
  overflow: hidden;
  background: var(--white);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

/* ─── SCREENS ───────────────────────────────────────────── */
.screen {
  display: none;
  height: 100svh;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  gap: 14px;
}
.screen.active { display: flex; }

/* ─── CHECKING ──────────────────────────────────────────── */
#screen-checking .icon {
  font-size: 52px;
  color: var(--green);
  animation: spin 1.1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── SUCCESS ───────────────────────────────────────────── */
#screen-success .icon {
  font-size: 76px;
  color: var(--green);
  animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes pop {
  from { transform: scale(0.4); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

/* ─── ERROR ─────────────────────────────────────────────── */
#screen-error .icon { font-size: 52px; color: var(--red); }

/* shared text styles */
.title {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: clamp(20px, 6vw, 26px);
  color: var(--text);
  text-align: center;
}
.title.green { color: var(--green); }
.subtitle {
  font-size: clamp(12px, 3.5vw, 14px);
  color: var(--muted);
  text-align: center;
}

/* ─── TUTORIAL ──────────────────────────────────────────── */
#screen-tutorial {
  padding: 0;
  justify-content: flex-start;
}

.tut-header {
  width: 100%;
  padding: 14px 20px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
  border-bottom: 1.5px solid var(--border);
}
.tut-header-title {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: clamp(17px, 5vw, 22px);
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 7px;
}
.tut-header-title i { color: var(--green); }
.tut-header-sub {
  font-size: clamp(10px, 2.8vw, 12px);
  color: var(--muted);
}

/* Steps container */
.steps-wrap {
  flex: 1;
  width: 100%;
  display: flex;
  flex-direction: column;
  padding: 10px 14px 12px;
  gap: 0;
  overflow: hidden;
  min-height: 0;
}

/* Connector arrow */
.connector {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding-left: 22px;         /* aligns with card interior */
  height: 18px;
  flex-shrink: 0;
  color: var(--muted);
  font-size: 12px;
  gap: 4px;
}
.connector span {
  font-size: 9px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.03em;
  font-family: 'Nunito', sans-serif;
}

/* Step card */
.step-card {
  flex: 1;
  min-height: 0;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  width: 100%;
  overflow: hidden;
}
.step-card.step-go {
  background: var(--green-light);
  border-color: var(--green);
  border-width: 2px;
  gap: 10px;
}

/* Step number badge */
.badge {
  width: 27px;
  height: 27px;
  border-radius: 50%;
  background: var(--green);
  color: var(--white);
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.step-go .badge {
  background: var(--green);
}

/* Step text */
.step-text {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.step-label {
  font-weight: 700;
  font-size: clamp(11px, 3vw, 13px);
  color: var(--text);
  line-height: 1.25;
}
.step-sub {
  font-size: clamp(10px, 2.6vw, 11px);
  color: var(--muted);
  line-height: 1.2;
}

/* Open button (step 1 action) */
.open-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--green);
  color: white;
  font-family: 'Fredoka', sans-serif;
  font-size: clamp(13px, 4vw, 16px);
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 50px;
  text-decoration: none;
  flex-shrink: 0;
  box-shadow: 0 3px 10px var(--green-glow);
  transition: transform 0.12s, box-shadow 0.12s;
}
.open-btn:active {
  transform: scale(0.96);
  box-shadow: 0 1px 5px var(--green-glow);
}
.open-btn i { font-size: 11px; }

/* Visual panel (right side of step) */
.step-vis {
  flex-shrink: 0;
  width: clamp(78px, 21vw, 108px);
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ─── BROWSER MOCKUP ────────────────────────────────────── */
.bm {
  width: 100%;
  max-width: 108px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--white);
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
}
.bm-bar {
  background: #F3F4F6;
  border-bottom: 1px solid var(--border);
  padding: 3px 5px;
  display: flex;
  align-items: center;
  gap: 3px;
}
.bm-dot { width: 5px; height: 5px; border-radius: 50%; }
.bm-addr {
  flex: 1;
  background: white;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 4px;
  font-size: 6.5px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bm-addr.warn { color: var(--red); }
.bm-body {
  padding: 5px 5px 7px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.bm-warn-icon { font-size: 15px; color: var(--red); }
.bm-warn-text {
  font-size: 7px;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  line-height: 1.2;
}
.bm-spacer { flex: 1; min-height: 4px; }

/* Highlighted tap target */
.tap-target {
  position: relative;
  border-radius: 4px;
  padding: 3px 7px;
  font-size: 7.5px;
  font-weight: 700;
  text-align: center;
  font-family: 'Nunito', sans-serif;
}
.tap-target.btn-style {
  background: var(--green-light);
  border: 1.5px solid var(--green);
  color: var(--green);
}
.tap-target.link-style {
  background: transparent;
  border: 1.5px solid var(--green);
  color: var(--green);
  text-decoration: none;
}
.tap-target::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 7px;
  border: 1.5px solid var(--green);
  opacity: 0;
  animation: ring 2s ease-out infinite;
}
@keyframes ring {
  0%   { opacity: 0.6; transform: scale(0.95); }
  80%  { opacity: 0;   transform: scale(1.25); }
  100% { opacity: 0;   transform: scale(1.25); }
}

/* ─── DIALOG MOCKUP (iOS confirm) ───────────────────────── */
.dm {
  width: 90%;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  background: white;
  box-shadow: 0 3px 12px rgba(0,0,0,0.13);
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
}
.dm-title {
  font-size: 7.5px;
  font-weight: 800;
  color: var(--text);
  padding: 6px 7px 2px;
  text-align: center;
}
.dm-body {
  font-size: 6.5px;
  color: var(--muted);
  padding: 0 7px 5px;
  text-align: center;
  line-height: 1.3;
}
.dm-divider { height: 1px; background: var(--border); }
.dm-row { display: flex; }
.dm-cancel {
  flex: 1;
  padding: 5px 3px;
  text-align: center;
  font-size: 7.5px;
  font-weight: 700;
  color: var(--muted);
}
.dm-ok {
  flex: 1;
  padding: 5px 3px;
  text-align: center;
  font-size: 7.5px;
  font-weight: 800;
  color: var(--green);
  background: var(--green-light);
  border-left: 1px solid var(--border);
  position: relative;
}
.dm-ok::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 6px;
  border: 1.5px solid var(--green);
  opacity: 0;
  animation: ring 2s ease-out infinite;
}
</style>
</head>
<body>

<!-- CHECKING -->
<div class="screen active" id="screen-checking">
  <i class="fa-solid fa-circle-notch icon"></i>
  <div class="title">Checking connection...</div>
  <div class="subtitle">Just a moment</div>
</div>

<!-- SUCCESS -->
<div class="screen" id="screen-success">
  <i class="fa-solid fa-circle-check icon"></i>
  <div class="title green">Link Verified!</div>
  <div class="subtitle">Opening the app now&hellip;</div>
</div>

<!-- BAD LINK -->
<div class="screen" id="screen-error">
  <i class="fa-solid fa-triangle-exclamation icon"></i>
  <div class="title">Invalid link</div>
  <div class="subtitle">Open this page using the QR code<br>shown on the host device.</div>
</div>

<!-- TUTORIAL -->
<div class="screen" id="screen-tutorial">
  <div class="tut-header">
    <div class="tut-header-title">
      <i class="fa-solid fa-shield-halved"></i>
      One-time setup
    </div>
    <div class="tut-header-sub">Follow these steps — only needed once</div>
  </div>
  <div class="steps-wrap" id="steps-wrap">
    <!-- injected by JS -->
  </div>
</div>

<script>
const params  = new URLSearchParams(window.location.search);
const ip      = params.get('ip');
const port    = params.get('port') || '443';
const appUrl  = (ip && port) ? `https://${ip}:${port}` : null;

/* ── platform detection ─────────────────────────────────── */
const ua      = navigator.userAgent;
const isIOS   = (/iPad|iPhone|iPod/.test(ua) && !window.MSStream)
             || (/Mac/.test(ua) && navigator.maxTouchPoints > 1);

/* ── screen switcher ─────────────────────────────────────── */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ── connection test ─────────────────────────────────────── */
async function checkConnection() {
  if (!appUrl) { show('screen-error'); return; }

  let signal;
  try { signal = AbortSignal.timeout(4000); }
  catch { const c = new AbortController(); setTimeout(() => c.abort(), 4000); signal = c.signal; }

  try {
    const res = await fetch(`${appUrl}/ping`, { signal, mode: 'cors' });
    if (res.ok) {
      show('screen-success');
      setTimeout(() => { window.location.href = appUrl; }, 1600);
      return;
    }
  } catch (_) {}

  buildTutorial();
  show('screen-tutorial');
}

/* ── mockup builders ─────────────────────────────────────── */
function shortIP(n) { return n.length > 14 ? n.slice(0, 13) + '…' : n; }

/* Android Chrome mockups */
function mockAndroid_Advanced() {
  return `<div class="bm">
    <div class="bm-bar">
      <div class="bm-dot" style="background:#EF4444"></div>
      <div class="bm-dot" style="background:#F59E0B"></div>
      <div class="bm-dot" style="background:#22C55E"></div>
      <div class="bm-addr warn"><i class="fa-solid fa-lock-open" style="font-size:5px"></i> ${shortIP(ip)}</div>
    </div>
    <div class="bm-body">
      <i class="fa-solid fa-lock-open bm-warn-icon"></i>
      <div class="bm-warn-text">Your connection<br>is not private</div>
      <div class="bm-spacer"></div>
      <div class="tap-target btn-style">Advanced</div>
    </div>
  </div>`;
}
function mockAndroid_Proceed() {
  const s = shortIP(ip);
  return `<div class="bm">
    <div class="bm-bar">
      <div class="bm-dot" style="background:#EF4444"></div>
      <div class="bm-dot" style="background:#F59E0B"></div>
      <div class="bm-dot" style="background:#22C55E"></div>
      <div class="bm-addr warn">${s}</div>
    </div>
    <div class="bm-body">
      <i class="fa-solid fa-circle-info bm-warn-icon" style="color:#9CA3AF;font-size:11px"></i>
      <div class="bm-warn-text" style="color:#9CA3AF;font-size:6px">Server cert not trusted<br>by this device</div>
      <div class="bm-spacer"></div>
      <div class="tap-target link-style">Proceed (unsafe)</div>
    </div>
  </div>`;
}

/* iOS Safari mockups */
function mockIOS_ShowDetails() {
  return `<div class="bm">
    <div class="bm-bar">
      <div class="bm-addr warn" style="text-align:center">
        <i class="fa-solid fa-lock-open" style="font-size:5px"></i> Not Secure
      </div>
    </div>
    <div class="bm-body">
      <i class="fa-solid fa-lock-open bm-warn-icon"></i>
      <div class="bm-warn-text">This Connection<br>Is Not Private</div>
      <div class="bm-spacer"></div>
      <div class="tap-target link-style">Show Details</div>
    </div>
  </div>`;
}
function mockIOS_VisitWebsite() {
  return `<div class="bm">
    <div class="bm-bar">
      <div class="bm-addr warn" style="text-align:center">
        <i class="fa-solid fa-lock-open" style="font-size:5px"></i> Not Secure
      </div>
    </div>
    <div class="bm-body">
      <i class="fa-solid fa-certificate bm-warn-icon" style="color:#9CA3AF;font-size:11px"></i>
      <div class="bm-warn-text" style="color:#9CA3AF;font-size:6px">Certificate issued by<br>unknown authority</div>
      <div class="bm-spacer"></div>
      <div class="tap-target link-style">visit this website</div>
    </div>
  </div>`;
}
function mockIOS_Continue() {
  return `<div class="dm">
    <div class="dm-title">Website Not Secure</div>
    <div class="dm-body">Safari wants to open this site even though it may not be secure.</div>
    <div class="dm-divider"></div>
    <div class="dm-row">
      <div class="dm-cancel">Cancel</div>
      <div class="dm-ok">Continue</div>
    </div>
  </div>`;
}

/* ── step definitions ────────────────────────────────────── */
function getSteps() {
  return isIOS ? [
    { label: 'Tap "Show Details"',      sub: 'At the bottom of the page',   vis: mockIOS_ShowDetails()  },
    { label: 'Tap "visit this website"', sub: 'The link in the details',      vis: mockIOS_VisitWebsite() },
    { label: 'Tap "Continue"',           sub: 'In the confirmation popup',    vis: mockIOS_Continue()     },
  ] : [
    { label: 'Tap "Advanced"',           sub: 'At the bottom of the page',   vis: mockAndroid_Advanced() },
    { label: 'Tap "Proceed (unsafe)"',   sub: 'The link that appears below', vis: mockAndroid_Proceed()  },
  ];
}

/* ── build tutorial DOM ──────────────────────────────────── */
function buildTutorial() {
  const wrap = document.getElementById('steps-wrap');
  const steps = getSteps();
  let html = '';

  /* Step 1 — the open button */
  html += `
  <div class="step-card step-go">
    <div class="badge">1</div>
    <div class="step-text">
      <div class="step-label">Open the link</div>
      <div class="step-sub">Tap to open in a new tab</div>
    </div>
    <a class="open-btn" href="${appUrl}" target="_blank">
      <i class="fa-solid fa-arrow-up-right-from-square"></i> Open
    </a>
  </div>`;

  /* Remaining steps */
  steps.forEach((s, i) => {
    html += `
    <div class="connector">
      <i class="fa-solid fa-arrow-down"></i>
    </div>
    <div class="step-card">
      <div class="badge">${i + 2}</div>
      <div class="step-text">
        <div class="step-label">${s.label}</div>
        <div class="step-sub">${s.sub}</div>
      </div>
      <div class="step-vis">${s.vis}</div>
    </div>`;
  });

  wrap.innerHTML = html;
}

/* ── go ──────────────────────────────────────────────────── */
checkConnection();
</script>
</body>
</html>
